version: "3.9"

services:
  finmentor:
    build: .
    container_name: finmentor-ai
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${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}
      - FINMENTOR_ENV=development
      - FINMENTOR__RL_MODEL__BACKEND=mock
      - FINMENTOR__AGENT__MEMORY_BACKEND=json
      - FINMENTOR__LLM__TEMPERATURE=0.2
    volumes:
      - ./logs:/app/logs
      - ./memory_store:/app/memory_store
      - ./saved_models:/app/saved_models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

